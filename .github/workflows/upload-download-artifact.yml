

name: Artifact upload and download example

on: [ workflow_dispatch ]

jobs:

    job1:
        runs-on: ubuntu-latest
        steps:
            - name: create a file
              run: echo "The Lord Jesus Christ is my Saviour"> data.txt

            - name: upload file as artifact
              uses: actions/upload-artifact@v4
              with:
                name: datafile
                path: data.txt


    job2:
        runs-on: ubuntu-latest
        needs: job1

        steps:
            - name: download artifact file data.txt
              uses: actions/download-artifact@v4
              with:
                name: datafile

            - name: display file content
              run: cat data.txt    