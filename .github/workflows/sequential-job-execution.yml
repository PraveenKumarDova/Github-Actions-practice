

name: Sequential job execution

on: workflow_dispatch

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Build step
              run: echo "Building application"

    test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: test step
              run: echo "Testing application"

    deploy:
        runs-on: ubuntu-latest
        needs: test
        steps:
            - name: deploy step
              run: echo "Deploying application"