

name: File operations in Github

on: workflow_dispatch 

jobs:
    files:
        runs-on: ubuntu-latest
        steps:
            - name: create a file
              run: echo "Praise The Lord,God bless you..." >> file2.txt

            - name: display the content of the file file2.txt
              run: cat file2.txt

            - name: display the date
              run: date

            - name: display the files and dirs
              run: ls -lrt 

            - name: display the current location
              run: pwd 
            